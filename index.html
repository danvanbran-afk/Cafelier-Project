<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafélier Bistrô</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="game-container">
    <header>
      <h1>Cafélier Bistrô</h1>
      <div class="stats">
        <p>Tips: $<span id="score">0</span></p>
        <p>Patience: <span id="lives">3</span>/3</p>
      </div>
    </header>

    <main id="app">
      <div id="order-board">
        <p class="order-prompt">Click here to order!</p>
        <button id="order-btn" class="primary-btn">Place New Order</button>
        <ul id="active-orders"></ul>
      </div>
    </main>

    <footer>
      <div class="input-area">
        <label for="barista-input">Prepare Order:</label>
        <input type="text" id="barista-input" placeholder="Type 'Coffee' or 'Tea'..." autocomplete="off" autofocus>
      </div>
      <p class="hint">Type the item name to serve the oldest order</p>
    </footer>
  </div>

  <!-- Alterado para a raiz para evitar erros de pasta -->
  <script src="index.js"></script>
</body>
</html>
