<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafélier Bistrô - Vintage Edition</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://images.stockcake.com/public/3/e/5/3e59eb35-c9fb-48df-bbff-ca8f96c43106_large/proud-pixel-barista-stockcake.jpg" rel="stylesheet">
</head>
<body>
  <div id="game-container">
    
    <!-- Mute Button -->
    <div class="audio-controls">
      <button id="mute-btn">🔊</button>
    </div>

    <!-- SCREEN 1: START MENU (Vintage Style) -->
    <section id="screen-start" class="screen">
      <h1>Cafélier Bistrô</h1>
      <div class="ranking-preview">
        <h3>🏆 Top 3 Baristas</h3>
        <ol id="best-three-list"></ol>
      </div>
      <button id="start-btn" class="primary-btn">OPEN SHOP</button>
    </section>

    <!-- SCREEN 2: THE GAME -->
    <section id="screen-game" class="screen hidden">
      <header>
        <div class="stats">
          <p>Tips: $<span id="score">0</span></p>
          <p>Time: <span id="timer">60</span>s</p>
        </div>
      </header>

      <!-- Barista Animation Area -->
      <div class="barista-container">
        <div class="barista-sprite"></div>
      </div>

      <div id="order-board">
        <button id="pause-btn">Pause Game</button>
        <ul id="active-orders"></ul>
      </div>
      <footer>
        <input type="text" id="barista-input" placeholder="Type & Enter..." autocomplete="off">
      </footer>
    </section>

    <!-- SCREEN 3: RANKING -->
    <section id="screen-ranking" class="screen hidden">
      <h1>Hall of Fame</h1>
      <div class="full-ranking">
        <ol id="top-ten-list"></ol>
      </div>
      <button id="restart-btn" class="primary-btn">BACK TO MENU</button>
    </section>

  </div>

  <!-- Background Music (Using your file name) -->
  <audio id="bg-music" loop>
    <source src="lnplusmusic-jazz-background-music-416542 (1).mp3" type="audio/mpeg">
  </audio>



  <script src="index.js"></script>
</body>
</html>
